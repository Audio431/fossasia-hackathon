<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Shadow - ML Analytics Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
            50% { box-shadow: 0 0 40px rgba(59, 130, 246, 0.8); }
        }
        .pulse-glow { animation: pulse-glow 2s infinite; }
        @keyframes slide-in {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .slide-in { animation: slide-in 0.5s ease-out; }
        @keyframes count-up {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }
        .count-up { animation: count-up 0.5s ease-out; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 min-h-screen">
    <div id="app"></div>

    <script>
        // Analytics Dashboard Application
        const app = {
            data: {
                modelMetrics: {
                    accuracy: 0.87,
                    precision: 0.91,
                    recall: 0.83,
                    f1Score: 0.87,
                    trainingSamples: 1250,
                    validationSamples: 312,
                    testSamples: 156,
                    falsePositives: 18,
                    falseNegatives: 22,
                    truePositives: 108,
                    trueNegatives: 288
                },
                featureImportance: [
                    { feature: 'Mutual Friends', importance: 0.92 },
                    { feature: 'Account Age', importance: 0.87 },
                    { feature: 'Previous Interactions', importance: 0.85 },
                    { feature: 'Grooming Language', importance: 0.81 },
                    { feature: 'Personal Info Requests', importance: 0.78 },
                    { feature: 'Secrecy Requests', importance: 0.75 },
                    { feature: 'Follower Ratio', importance: 0.71 },
                    { feature: 'Transition Speed', importance: 0.68 },
                    { feature: 'Pressure Tactics', importance: 0.64 },
                    { feature: 'Time of Day', importance: 0.52 }
                ],
                confusionMatrix: {
                    actualStranger: { predictedStranger: 108, predictedKnown: 22 },
                    actualKnown: { predictedStranger: 18, predictedKnown: 288 }
                },
                trainingHistory: [
                    { epoch: 1, loss: 0.65, accuracy: 0.62 },
                    { epoch: 5, loss: 0.48, accuracy: 0.74 },
                    { epoch: 10, loss: 0.35, accuracy: 0.81 },
                    { epoch: 15, loss: 0.28, accuracy: 0.85 },
                    { epoch: 20, loss: 0.24, accuracy: 0.87 }
                ],
                platformPerformance: [
                    { platform: 'Instagram', accuracy: 89, samples: 485 },
                    { platform: 'Twitter', accuracy: 86, samples: 312 },
                    { platform: 'TikTok', accuracy: 84, samples: 256 },
                    { platform: 'Discord', accuracy: 81, samples: 198 }
                ]
            },

            init() {
                this.render();
                this.initCharts();
                this.startLiveUpdates();
            },

            render() {
                document.getElementById('app').innerHTML = `
                    <div class="min-h-screen">
                        <!-- Header -->
                        <header class="bg-gradient-to-r from-slate-900 to-slate-800 text-white py-8">
                            <div class="max-w-7xl mx-auto px-4">
                                <div class="flex items-center justify-between">
                                    <div>
                                        <h1 class="text-4xl font-bold mb-2">🧠 ML Analytics Dashboard</h1>
                                        <p class="text-slate-400">Real-time model performance and training metrics</p>
                                    </div>
                                    <div class="flex items-center gap-3">
                                        <div class="bg-green-600 px-4 py-2 rounded-lg pulse-glow">
                                            <span class="font-medium">Model Active</span>
                                        </div>
                                        <div class="bg-blue-600 px-4 py-2 rounded-lg">
                                            <span class="font-medium">v2.1</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </header>

                        <!-- Main Content -->
                        <main class="max-w-7xl mx-auto px-4 py-8">
                            <!-- Key Metrics -->
                            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                                <div class="bg-white rounded-xl shadow-lg p-6 border border-slate-200 slide-in">
                                    <div class="flex items-center justify-between mb-4">
                                        <div class="bg-blue-100 p-3 rounded-lg">
                                            <span class="text-2xl">🎯</span>
                                        </div>
                                        <span class="text-green-600 text-sm font-medium">↑ 2.3%</span>
                                    </div>
                                    <h3 class="text-sm text-slate-600 mb-1">Accuracy</h3>
                                    <p class="text-4xl font-bold text-slate-900">${(this.data.modelMetrics.accuracy * 100).toFixed(1)}%</p>
                                </div>

                                <div class="bg-white rounded-xl shadow-lg p-6 border border-slate-200 slide-in" style="animation-delay: 0.1s">
                                    <div class="flex items-center justify-between mb-4">
                                        <div class="bg-green-100 p-3 rounded-lg">
                                            <span class="text-2xl">✓</span>
                                        </div>
                                        <span class="text-green-600 text-sm font-medium">↑ 1.8%</span>
                                    </div>
                                    <h3 class="text-sm text-slate-600 mb-1">Precision</h3>
                                    <p class="text-4xl font-bold text-slate-900">${(this.data.modelMetrics.precision * 100).toFixed(1)}%</p>
                                </div>

                                <div class="bg-white rounded-xl shadow-lg p-6 border border-slate-200 slide-in" style="animation-delay: 0.2s">
                                    <div class="flex items-center justify-between mb-4">
                                        <div class="bg-purple-100 p-3 rounded-lg">
                                            <span class="text-2xl">⚡</span>
                                        </div>
                                        <span class="text-green-600 text-sm font-medium">↑ 3.1%</span>
                                    </div>
                                    <h3 class="text-sm text-slate-600 mb-1">Recall</h3>
                                    <p class="text-4xl font-bold text-slate-900">${(this.data.modelMetrics.recall * 100).toFixed(1)}%</p>
                                </div>

                                <div class="bg-white rounded-xl shadow-lg p-6 border border-slate-200 slide-in" style="animation-delay: 0.3s">
                                    <div class="flex items-center justify-between mb-4">
                                        <div class="bg-orange-100 p-3 rounded-lg">
                                            <span class="text-2xl">📊</span>
                                        </div>
                                        <span class="text-green-600 text-sm font-medium">↑ 2.7%</span>
                                    </div>
                                    <h3 class="text-sm text-slate-600 mb-1">F1 Score</h3>
                                    <p class="text-4xl font-bold text-slate-900">${(this.data.modelMetrics.f1Score * 100).toFixed(1)}%</p>
                                </div>
                            </div>

                            <!-- Charts Row -->
                            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
                                <!-- Training Progress -->
                                <div class="bg-white rounded-xl shadow-lg p-6 border border-slate-200">
                                    <h3 class="text-xl font-bold mb-4 flex items-center gap-2">
                                        <span>📈</span> Training Progress
                                    </h3>
                                    <canvas id="trainingChart" height="200"></canvas>
                                </div>

                                <!-- Confusion Matrix -->
                                <div class="bg-white rounded-xl shadow-lg p-6 border border-slate-200">
                                    <h3 class="text-xl font-bold mb-4 flex items-center gap-2">
                                        <span>🎯</span> Confusion Matrix
                                    </h3>
                                    <canvas id="confusionChart" height="200"></canvas>
                                </div>
                            </div>

                            <!-- Feature Importance & Platform Performance -->
                            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
                                <!-- Feature Importance -->
                                <div class="bg-white rounded-xl shadow-lg p-6 border border-slate-200">
                                    <h3 class="text-xl font-bold mb-4 flex items-center gap-2">
                                        <span>🔍</span> Feature Importance
                                    </h3>
                                    <div class="space-y-3">
                                        ${this.data.featureImportance.map((feat, i) => `
                                            <div class="flex items-center gap-3">
                                                <span class="text-sm font-medium w-32">${feat.feature}</span>
                                                <div class="flex-1 bg-slate-200 rounded-full h-6">
                                                    <div class="h-6 bg-gradient-to-r from-blue-600 to-purple-600 rounded-full transition-all duration-500" style="width: ${feat.importance * 100}%"></div>
                                                </div>
                                                <span class="text-sm font-bold w-12">${(feat.importance * 100).toFixed(0)}%</span>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>

                                <!-- Platform Performance -->
                                <div class="bg-white rounded-xl shadow-lg p-6 border border-slate-200">
                                    <h3 class="text-xl font-bold mb-4 flex items-center gap-2">
                                        <span>📱</span> Platform Performance
                                    </h3>
                                    <canvas id="platformChart" height="250"></canvas>
                                </div>
                            </div>

                            <!-- Detailed Metrics -->
                            <div class="bg-white rounded-xl shadow-lg p-6 border border-slate-200 mb-8">
                                <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
                                    <span>📊</span> Detailed Model Metrics
                                </h3>
                                <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                                    <div class="text-center p-4 bg-slate-50 rounded-lg">
                                        <p class="text-3xl font-bold text-slate-900">${this.data.modelMetrics.trainingSamples}</p>
                                        <p class="text-sm text-slate-600">Training Samples</p>
                                    </div>
                                    <div class="text-center p-4 bg-slate-50 rounded-lg">
                                        <p class="text-3xl font-bold text-slate-900">${this.data.modelMetrics.validationSamples}</p>
                                        <p class="text-sm text-slate-600">Validation Samples</p>
                                    </div>
                                    <div class="text-center p-4 bg-slate-50 rounded-lg">
                                        <p class="text-3xl font-bold text-slate-900">${this.data.modelMetrics.testSamples}</p>
                                        <p class="text-sm text-slate-600">Test Samples</p>
                                    </div>
                                    <div class="text-center p-4 bg-slate-50 rounded-lg">
                                        <p class="text-3xl font-bold text-slate-900">28</p>
                                        <p class="text-sm text-slate-600">Features Used</p>
                                    </div>
                                </div>

                                <div class="mt-6 grid grid-cols-2 md:grid-cols-4 gap-4">
                                    <div class="p-4 bg-green-50 rounded-lg border border-green-200">
                                        <p class="text-2xl font-bold text-green-700">${this.data.modelMetrics.truePositives}</p>
                                        <p class="text-sm text-green-700">True Positives</p>
                                    </div>
                                    <div class="p-4 bg-blue-50 rounded-lg border border-blue-200">
                                        <p class="text-2xl font-bold text-blue-700">${this.data.modelMetrics.trueNegatives}</p>
                                        <p class="text-sm text-blue-700">True Negatives</p>
                                    </div>
                                    <div class="p-4 bg-orange-50 rounded-lg border border-orange-200">
                                        <p class="text-2xl font-bold text-orange-700">${this.data.modelMetrics.falsePositives}</p>
                                        <p class="text-sm text-orange-700">False Positives</p>
                                    </div>
                                    <div class="p-4 bg-red-50 rounded-lg border border-red-200">
                                        <p class="text-2xl font-bold text-red-700">${this.data.modelMetrics.falseNegatives}</p>
                                        <p class="text-sm text-red-700">False Negatives</p>
                                    </div>
                                </div>
                            </div>

                            <!-- Live Inference Stats -->
                            <div class="bg-gradient-to-r from-blue-600 to-purple-600 rounded-xl p-8 text-white">
                                <div class="flex items-center justify-between mb-6">
                                    <div>
                                        <h3 class="text-2xl font-bold flex items-center gap-2">
                                            <span>⚡</span> Live Inference Statistics
                                        </h3>
                                        <p class="text-blue-100">Real-time model performance</p>
                                    </div>
                                    <div class="flex items-center gap-2">
                                        <div class="w-3 h-3 bg-green-400 rounded-full animate-pulse"></div>
                                        <span class="text-sm font-medium">Live</span>
                                    </div>
                                </div>

                                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                                    <div class="bg-white/10 backdrop-blur-sm rounded-lg p-4">
                                        <p class="text-3xl font-bold" id="inferenceCount">1,247</p>
                                        <p class="text-sm text-blue-100">Total Inferences</p>
                                    </div>
                                    <div class="bg-white/10 backdrop-blur-sm rounded-lg p-4">
                                        <p class="text-3xl font-bold" id="avgInferenceTime">147ms</p>
                                        <p class="text-sm text-blue-100">Avg Inference Time</p>
                                    </div>
                                    <div class="bg-white/10 backdrop-blur-sm rounded-lg p-4">
                                        <p class="text-3xl font-bold" id="strangersDetected">156</p>
                                        <p class="text-sm text-blue-100">Strangers Detected</p>
                                    </div>
                                    <div class="bg-white/10 backdrop-blur-sm rounded-lg p-4">
                                        <p class="text-3xl font-bold" id="alertsShown">89</p>
                                        <p class="text-sm text-blue-100">Alerts Shown</p>
                                    </div>
                                </div>
                            </div>
                        </main>

                        <!-- Footer -->
                        <footer class="bg-slate-900 text-white py-6 mt-8">
                            <div class="max-w-7xl mx-auto px-4 text-center">
                                <p class="text-slate-400">Privacy Shadow ML Analytics Dashboard • FOSSASIA Hackathon 2025</p>
                            </div>
                        </footer>
                    </div>
                `;
            },

            initCharts() {
                // Training Progress Chart
                const trainingCtx = document.getElementById('trainingChart').getContext('2d');
                new Chart(trainingCtx, {
                    type: 'line',
                    data: {
                        labels: this.data.trainingHistory.map(h => `Epoch ${h.epoch}`),
                        datasets: [{
                            label: 'Accuracy',
                            data: this.data.trainingHistory.map(h => h.accuracy),
                            borderColor: 'rgb(59, 130, 246)',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            tension: 0.4,
                            fill: true
                        }, {
                            label: 'Loss',
                            data: this.data.trainingHistory.map(h => h.loss),
                            borderColor: 'rgb(239, 68, 68)',
                            backgroundColor: 'rgba(239, 68, 68, 0.1)',
                            tension: 0.4,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'top',
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                max: 1
                            }
                        }
                    }
                });

                // Confusion Matrix Chart
                const confusionCtx = document.getElementById('confusionChart').getContext('2d');
                new Chart(confusionCtx, {
                    type: 'bar',
                    data: {
                        labels: ['Actual Stranger', 'Actual Known'],
                        datasets: [{
                            label: 'Predicted Stranger',
                            data: [this.data.confusionMatrix.actualStranger.predictedStranger,
                                   this.data.confusionMatrix.actualKnown.predictedStranger],
                            backgroundColor: 'rgba(239, 68, 68, 0.8)'
                        }, {
                            label: 'Predicted Known',
                            data: [this.data.confusionMatrix.actualStranger.predictedKnown,
                                   this.data.confusionMatrix.actualKnown.predictedKnown],
                            backgroundColor: 'rgba(34, 197, 94, 0.8)'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'top',
                            }
                        },
                        scales: {
                            x: {
                                stacked: true,
                            },
                            y: {
                                stacked: true,
                                beginAtZero: true
                            }
                        }
                    }
                });

                // Platform Performance Chart
                const platformCtx = document.getElementById('platformChart').getContext('2d');
                new Chart(platformCtx, {
                    type: 'doughnut',
                    data: {
                        labels: this.data.platformPerformance.map(p => p.platform),
                        datasets: [{
                            data: this.data.platformPerformance.map(p => p.samples),
                            backgroundColor: [
                                'rgba(239, 68, 68, 0.8)',
                                'rgba(59, 130, 246, 0.8)',
                                'rgba(34, 197, 94, 0.8)',
                                'rgba(251, 146, 60, 0.8)'
                            ]
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'right',
                            },
                            tooltip: {
                                callbacks: {
                                    afterLabel: function(context) {
                                        const platform = app.data.platformPerformance[context.dataIndex];
                                        return `Accuracy: ${platform.accuracy}%`;
                                    }
                                }
                            }
                        }
                    }
                });
            },

            startLiveUpdates() {
                // Simulate live inference updates
                setInterval(() => {
                    const inferenceEl = document.getElementById('inferenceCount');
                    const timeEl = document.getElementById('avgInferenceTime');
                    const strangersEl = document.getElementById('strangersDetected');
                    const alertsEl = document.getElementById('alertsShown');

                    if (inferenceEl) {
                        const current = parseInt(inferenceEl.textContent.replace(',', ''));
                        inferenceEl.textContent = (current + Math.floor(Math.random() * 3)).toLocaleString();
                    }

                    if (timeEl) {
                        const baseTime = 140 + Math.random() * 15;
                        timeEl.textContent = `${Math.round(baseTime)}ms`;
                    }

                    if (strangersEl) {
                        const current = parseInt(strangersEl.textContent);
                        if (Math.random() > 0.7) {
                            strangersEl.textContent = current + 1;
                        }
                    }

                    if (alertsEl) {
                        const current = parseInt(alertsEl.textContent);
                        if (Math.random() > 0.8) {
                            alertsEl.textContent = current + 1;
                        }
                    }
                }, 2000);
            }
        };

        // Initialize app
        document.addEventListener('DOMContentLoaded', () => {
            app.init();
        });
    </script>
</body>
</html>
